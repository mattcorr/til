site_name: Matt Corr TIL
site_description: Short technical notes, fixes, and reminders.
site_url: https://til.mattcorr.com/
repo_url: https://github.com/mattcorr/til
repo_name: mattcorr/til
docs_dir: docs
site_dir: site
use_directory_urls: true

theme:
  name: material
  language: en
  features:
    - content.code.copy
    - navigation.instant
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
  icon:
    repo: fontawesome/brands/github

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences

not_in_nav: |
  Summary.md

nav:
  - Home: index.md
  - Azure:
      - Overview: azure/README.md
      - Apply Tags to Resource: azure/apply-tags-to-resource.md
  - Azure DevOps:
      - Overview: azuredevops/README.md
      - Build Unable To Start: azuredevops/build-unable-tostart.md
  - BizTalk:
